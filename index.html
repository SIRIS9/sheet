<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة التسجيل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #f0f2f5);
            --text-color: var(--tg-theme-text-color, #1c1c1e);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --primary-color: var(--tg-theme-button-color, #007aff);
            --border-color: #d1d1d6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: var(--hint-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 12px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: transparent;
            color: var(--text-color);
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        input::placeholder {
            color: var(--hint-color);
        }

        button[type="submit"] {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button[type="submit"]:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2 id="formTitle">استمارة البيانات</h2>
            <p id="formSubtitle">يرجى إدخال بياناتك بدقة.</p>
        </div>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="fullName">الاسم الرباعي واللقب</label>
                <input type="text" id="fullName" placeholder="مثال: أحمد محمد علي حسن" required>
            </div>

            <div class="form-group">
                <label for="motherName">اسم الأم الثلاثي</label>
                <input type="text" id="motherName" placeholder="مثال: فاطمة إبراهيم محمود" required>
            </div>

            <div class="form-group">
                <label for="education">التحصيل الدراسي</label>
                <input type="text" id="education" placeholder="مثال: بكالوريوس إدارة أعمال" required>
            </div>

            <div class="form-group">
                <label for="gradYear">سنة التخرج</label>
                <input type="number" id="gradYear" placeholder="مثال: 2022" required>
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="مثال: 07700000000" required dir="ltr" style="text-align: right;">
            </div>

            <button type="submit" id="submitBtn">حفظ واعتماد البيانات</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let targetUserId = "";

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            
            if(urlParams.has('target_id')) {
                targetUserId = urlParams.get('target_id');
                document.getElementById('formTitle').innerText = "تعديل حساب (للمدير)";
                document.getElementById('formSubtitle').innerText = `أنت تقوم بتعديل بيانات المستخدم: ${targetUserId}`;
                document.getElementById('submitBtn').innerText = "حفظ التعديلات للمستخدم";
            }

            if(urlParams.has('fullName')) {
                document.getElementById('fullName').value = urlParams.get('fullName');
                document.getElementById('motherName').value = urlParams.get('motherName');
                document.getElementById('education').value = urlParams.get('education');
                document.getElementById('gradYear').value = urlParams.get('gradYear');
                document.getElementById('phone').value = urlParams.get('phone');
                
                if(!targetUserId) {
                    document.getElementById('formTitle').innerText = "تحديث بياناتي";
                    document.getElementById('formSubtitle').innerText = "قم بتعديل الحقول التي ترغب بتحديثها أدناه.";
                    document.getElementById('submitBtn').innerText = "حفظ التحديثات الجديدة";
                }
            }
            
            if(urlParams.has('admin_add')) {
                document.getElementById('formTitle').innerText = "إضافة مستخدم يدوي";
                document.getElementById('formSubtitle').innerText = "أنت تقوم الآن بإضافة سجل جديد كمدير.";
            }
        });

        const form = document.getElementById('registrationForm');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            if(form.checkValidity()) {
                const data = {
                    fullName: document.getElementById('fullName').value.trim(),
                    motherName: document.getElementById('motherName').value.trim(),
                    education: document.getElementById('education').value.trim(),
                    gradYear: document.getElementById('gradYear').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    target_id: targetUserId
                };
                
                tg.sendData(JSON.stringify(data));
            } else {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("تنبيه: يرجى التأكد من تعبئة جميع الحقول المطلوبة بشكل صحيح.");
            }
        });
    </script>
</body>
</html>
